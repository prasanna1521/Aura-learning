{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Learning | Welcome</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            background: linear-gradient(135deg, #e2f1e7 0%, #e0ece4 50%, #d4e7db 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: #1f2937;
            padding: 20px;
        }

        .login-card {
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 900px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        .brand-title {
            font-weight: 800;
            color: #166534;
            font-size: 1.8rem;
            letter-spacing: -0.5px;
        }

        .mascot-illustration {
            max-width: 220px;
            width: 100%;
            height: auto;
            object-fit: contain;
        }

        .form-control-pill {
            border-radius: 12px;
            border: 1px solid #e5e7eb;
            padding: 12px 18px;
            background-color: #f9fafb;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }

        .form-control-pill:focus {
            background-color: #ffffff;
            border-color: #166534;
            box-shadow: 0 0 0 4px rgba(22, 101, 52, 0.1);
        }

        .btn-green-submit {
            background-color: #14532d;
            color: #ffffff;
            font-weight: 600;
            padding: 12px 28px;
            border-radius: 20px;
            border: none;
            transition: background-color 0.2s ease;
        }

        .btn-green-submit:hover {
            background-color: #166534;
            color: #ffffff;
        }

        .link-create-acc {
            color: #15803d;
            font-weight: 700;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .link-create-acc:hover {
            color: #166534;
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="login-card p-4 p-md-5">
    <div class="row align-items-center g-4">
        <!-- Left Column: Branding & Illustration -->
        <div class="col-md-5 text-center border-end-md pe-md-4">
            <div class="mb-3">
                <img src="https://illustrations.popsy.co/emerald/studying.svg" alt="Lumina Mascot" class="mascot-illustration">
            </div>
            <div class="brand-title mb-2">Aura Learning</div>
            <p class="text-muted small px-3">
                Join our friendly space to grow your knowledge step-by-step at your own custom pace!
            </p>
        </div>

        <!-- Right Column: Login Form -->
        <div class="col-md-7 ps-md-4">
            <div class="mb-4">
                <h3 class="fw-bold text-dark mb-1">Hello, Explorer! 👋</h3>
                <p class="text-muted small">Log into your learning path below.</p>
            </div>

            {% if error %}
                <div class="alert alert-danger py-2 small mb-3 border-0 rounded-3">
                    <i class="fa-solid fa-triangle-exclamation me-1"></i> {{ error }}
                </div>
            {% endif %}

            <form method="POST" action="{% url 'login' %}">
                {% csrf_token %}
                
                <div class="mb-3">
                    <label class="form-label text-secondary fw-semibold small mb-1">User Name</label>
                    <input type="text" name="username" class="form-control form-control-pill" placeholder="Enter your user name" required autocomplete="username">
                </div>

                <div class="mb-4">
                    <label class="form-label text-secondary fw-semibold small mb-1">Password</label>
                    <input type="password" name="password" class="form-control form-control-pill" placeholder="Enter your hidden password" required autocomplete="current-password">
                </div>

                <div class="d-flex align-items-center justify-content-between pt-2">
                    <a href="{% url 'assessment' %}?reset=1" class="link-create-acc">
                        Create an account instead
                    </a>
                    <button type="submit" class="btn btn-green-submit">
                        Let's Go! <i class="fa-solid fa-arrow-right ms-1"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
