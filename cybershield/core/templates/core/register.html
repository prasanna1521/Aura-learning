<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Learning | Create Account</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #fef08a, #bbf7d0, #bfdbfe); min-height: 100vh; font-family: 'Segoe UI', system-ui, sans-serif; }
        .card-container { background: rgba(255, 255, 255, 0.95); border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.06); border: none; backdrop-filter: blur(10px); }
        .btn-primary-custom { background: linear-gradient(135deg, #10b981, #059669); color: #fff; border-radius: 16px; font-weight: 600; padding: 12px 28px; border: none; transition: transform 0.2s; }
        .btn-primary-custom:hover { transform: translateY(-2px); color: #fff; }
        .form-control-custom { border-radius: 14px; border: 2px solid #e2e8f0; padding: 12px 16px; background-color: #f8fafc; font-size: 1rem; }
        .form-control-custom:focus { border-color: #10b981; box-shadow: none; background-color: #fff; }
        .text-brand { background: linear-gradient(135deg, #047857, #065f46); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; }
        .mascot-svg { max-height: 220px; width: 100%; }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center align-items-center min-vh-100 py-5">
    <div class="col-12 col-md-10 col-lg-9 card-container p-4 p-md-5">
        <div class="row align-items-center">
            
            <div class="col-md-5 text-center mb-4 mb-md-0 pe-md-4 border-end">
                <div class="mb-3">
                    <svg class="mascot-svg" viewBox="0 0 100 100">
                        <circle cx="50" cy="50" r="45" fill="#10b981"/>
                        <circle cx="35" cy="40" r="6" fill="#fff"/>
                        <circle cx="65" cy="40" r="6" fill="#fff"/>
                        <circle cx="35" cy="40" r="3" fill="#000"/>
                        <circle cx="65" cy="40" r="3" fill="#000"/>
                        <path d="M 40 65 Q 50 78 60 65" stroke="#fff" stroke-width="4" fill="none" stroke-linecap="round"/>
                    </svg>
                </div>
                <h2 class="text-brand mb-2">Aura Learning</h2>
                <p class="text-secondary small px-2">Join us today and explore interactive learning!</p>
            </div>

            <div class="col-md-7 ps-md-4">
                <h3 class="fw-bold text-dark mb-1">Create Account ✨</h3>
                <p class="text-muted small mb-4">Please fill in your details to get started.</p>

                {% if error %}
                    <div class="alert alert-danger py-2 rounded-3 small mb-3">
                        <i class="fa-solid fa-circle-exclamation me-1"></i> {{ error }}
                    </div>
                {% endif %}

                <form method="POST" action="{% url 'register' %}">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label small text-secondary fw-bold mb-1">Full Name</label>
                        <input type="text" name="full_name" class="form-control form-control-custom" placeholder="e.g. Alex Morgan" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label small text-secondary fw-bold mb-1">Username</label>
                        <input type="text" name="username" class="form-control form-control-custom" placeholder="Choose a unique username" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label small text-secondary fw-bold mb-1">Email Address</label>
                        <input type="email" name="email" class="form-control form-control-custom" placeholder="name@example.com" required>
                    </div>

                    <div class="row g-2 mb-4">
                        <div class="col-6">
                            <label class="form-label small text-secondary fw-bold mb-1">Password</label>
                            <input type="password" name="password" class="form-control form-control-custom" placeholder="••••••••" required>
                        </div>
                        <div class="col-6">
                            <label class="form-label small text-secondary fw-bold mb-1">Confirm Password</label>
                            <input type="password" name="confirm_password" class="form-control form-control-custom" placeholder="••••••••" required>
                        </div>
                    </div>

                    <div class="d-flex align-items-center justify-content-between">
                        <a href="{% url 'login' %}" class="text-decoration-none text-success small fw-bold">
                            Already registered? Login
                        </a>
                        <button type="submit" class="btn btn-primary-custom px-4">
                            Register <i class="fa-solid fa-user-plus ms-1"></i>
                        </button>
                    </div>
                </form>
            </div>

        </div>
    </div>
</div>

</body>
</html>
